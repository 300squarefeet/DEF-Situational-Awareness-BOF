# .cargo/config.toml
#
# build-std is intentionally NOT listed here so that host-side `cargo test`
# (Darwin) works without the duplicate-core lang-item error caused by mixing
# a rebuilt `core` with crates that transitively depend on
# `rustc-std-workspace-core`.  The build scripts (scripts/build_one.sh,
# scripts/build_all.sh) pass `-Z build-std=…` and
# `-Z build-std-features=…` on the command line for the Windows BOF targets.

[target.x86_64-pc-windows-gnu]
rustflags = [
    "-C", "panic=abort",
    "-C", "symbol-mangling-version=v0",
    "-Z", "function-sections",
    "-C", "link-arg=--no-entry",
]

[target.i686-pc-windows-gnu]
rustflags = [
    "-C", "panic=abort",
    "-C", "symbol-mangling-version=v0",
    "-Z", "function-sections",
    "-C", "link-arg=--no-entry",
]

[target.aarch64-apple-darwin]
rustflags = []

[target.x86_64-apple-darwin]
rustflags = []
